services:
  db:
    image: postgres:16-alpine
    container_name: ganassa-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ganassa}
      POSTGRES_USER: ${POSTGRES_USER:-ganassa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ganassa_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ganassa} -d ${POSTGRES_DB:-ganassa}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ganassa-app
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
    command: npm run dev

volumes:
  pgdata:
